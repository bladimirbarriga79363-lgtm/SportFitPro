<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visión - SportFit Pro</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div id="app-vision"></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="assets/js/componentes.js"></script>
    
    <script>
        const appVision = Vue.createApp({
            components: {
                'mi-header': ComponenteHeader,
                'mi-footer': ComponenteFooter
            },
            template: `
                <div>
                    <mi-header></mi-header>

                    <div class="container">
                        <h1 style="text-align: center; color: #002b5c;">Nuestra Visión</h1>
                        <br>
                        <p style="text-align: center; font-size: 1.1rem;">Hacia dónde vamos y qué queremos lograr.</p>
                        <br>
                        
                        <div style="background: #f9f9f9; padding: 40px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                            <p style="font-size: 1.2rem; line-height: 1.6;">Ser la marca de referencia en México para el estilo de vida activo y casual, demostrando que no necesitas ser un atleta olímpico para disfrutar del deporte. Queremos ser tu primera opción cuando busques comodidad y calidad para tu día a día.</p>
                        </div>
                    </div>

                    <mi-footer></mi-footer>
                </div>
            `
        });
        appVision.mount('#app-vision');
    </script>
</body>
</html>
