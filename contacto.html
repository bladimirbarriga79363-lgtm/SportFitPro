<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - SportFit Pro</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        form input, form textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo"><img src="assets/img/logo.png" alt="SportFit Pro"></div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="catalogo.html">Catálogo</a></li>
                    <li><a href="mision.html">Misión</a></li>
                    <li><a href="vision.html">Visión</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                    <li><a href="admin.html">Administración</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1>Contáctanos</h1>
        <p>¿Tienes dudas sobre tu talla o algún pedido? Escríbenos.</p>
        
        <form>
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ejemplo Kevin Martínez" required>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="kevin@gmail.com" required>

            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu duda aquí..."></textarea>

            <button type="submit" class="btn-comprar">Enviar Mensaje</button>
        </form>
    </div>

    <footer>
        <p>SportFit Pro</p>
        <p>
    <div style="display: flex; justify-content: center; gap: 15px; margin-top: 10px;">
            
            <a href="https://validator.w3.org/">
                <img src="https://www.w3.org/html/logo/badge/html5-badge-h-solo.png" 
                    width="63" height="64" alt="HTML5 Válido" title="HTML5 Válido" style="border:0;">
            </a>
    <a href="https://jigsaw.w3.org/css-validator/check/referer">
        <img style="border:0;width:88px;height:31px"
            src="https://jigsaw.w3.org/css-validator/images/vcss-blue"
            alt="¡CSS Válido!" />
    </a>
</p>   
</div>
    </footer>
</body>
</html>
