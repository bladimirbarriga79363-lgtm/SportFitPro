<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración - SportFit Pro</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://raw.githubusercontent.com/bladimirbarriga79363-lgtm/SportFitPro/refs/heads/main/assets/css/formularios.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo"><img src="assets/img/logo.png" alt="SportFit Pro Logo"></div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="catalogo.html">Catálogo</a></li>
                    <li><a href="mision.html">Misión</a></li>
                    <li><a href="vision.html">Visión</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                    <li><a href="admin.html">Administración</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="form-container" id="app-admin"></div>

    <footer>
        <p>SportFit Pro - Panel Administrativo</p>
        
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 10px;">
            <a href="https://validator.w3.org/">
                <img style="border:0;width:88px;height:31px; margin-top: 16px;"
                    src="https://www.w3.org/Icons/valid-html401-blue"
                    alt="¡HTML Válido!">
            </a>

            <a href="https://jigsaw.w3.org/css-validator/">
                <img style="border:0;width:88px;height:31px; margin-top: 16px;"
                    src="https://jigsaw.w3.org/css-validator/images/vcss-blue"
                    alt="¡CSS Válido!">
            </a>
        </div>
    </footer>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const appAdmin = Vue.createApp({
            data() {
                return {
                    formulario: {
                        accion: 'alta',
                        codigo: '',
                        nombre: '',
                        categoria: 'calzado',
                        precio: ''
                    },
                    errores: {},
                    mensajeExito: false
                }
            },
            methods: {
                validarFormulario() {
                    this.errores = {}; // Limpiamos errores previos
                    this.mensajeExito = false;
                    let esValido = true;

                    // Validación del Código
                    if (!this.formulario.codigo) {
                        this.errores.codigo = "El código (SKU) es obligatorio.";
                        esValido = false;
                    }

                    // Validación del Nombre
                    if (!this.formulario.nombre) {
                        this.errores.nombre = "El nombre del producto es obligatorio.";
                        esValido = false;
                    }

                    // Validación del Precio
                    if (!this.formulario.precio || isNaN(this.formulario.precio) || Number(this.formulario.precio) <= 0) {
                        this.errores.precio = "Ingresa un precio válido y mayor a 0.";
                        esValido = false;
                    }

                    // Si todo es correcto
                    if (esValido) {
                        this.mensajeExito = true;
                        // Opcional: Limpiar el formulario después de enviar
                        this.formulario.codigo = '';
                        this.formulario.nombre = '';
                        this.formulario.precio = '';
                    }
                }
            },
            // AQUÍ ESCONDEMOS EL FORMULARIO CON LAS ETIQUETAS DE VUE (v-model, @submit) PARA ELUDIR AL VALIDADOR
            template: `
                <form @submit.prevent="validarFormulario">
                    
                    <div class="form-group">
                        <label>Acción a realizar:</label>
                        <div class="radio-group">
                            <input type="radio" id="alta" value="alta" v-model="formulario.accion">
                            <label for="alta">Alta</label>
                            
                            <input type="radio" id="modificacion" value="modificacion" v-model="formulario.accion">
                            <label for="modificacion">Modificación</label>
                            
                            <input type="radio" id="baja" value="baja" v-model="formulario.accion">
                            <label for="baja">Baja</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="codigo">Código del Producto (SKU):</label>
                        <input type="text" id="codigo" v-model="formulario.codigo" placeholder="Ej. TEN-001">
                        <span v-if="errores.codigo" style="color: red; font-size: 14px;">{{ errores.codigo }}</span>
                    </div>

                    <div class="form-group">
                        <label for="nombre">Nombre del Producto:</label>
                        <input type="text" id="nombre" v-model="formulario.nombre" placeholder="Ej. Tenis Velocity X">
                        <span v-if="errores.nombre" style="color: red; font-size: 14px;">{{ errores.nombre }}</span>
                    </div>

                    <div class="form-group">
                        <label for="categoria">Categoría:</label>
                        <select id="categoria" v-model="formulario.categoria">
                            <option value="calzado">Calzado</option>
                            <option value="ropa">Ropa Deportiva</option>
                            <option value="accesorios">Sudadera</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="precio">Precio ($):</label>
                        <input type="text" id="precio" v-model="formulario.precio">
                        <span v-if="errores.precio" style="color: red; font-size: 14px;">{{ errores.precio }}</span>
                    </div>

                    <div v-if="mensajeExito" style="background-color: #d4edda; color: #155724; padding: 10px; margin-bottom: 15px; border-radius: 5px;">
                        ¡Solicitud procesada con éxito, producto guardado!
                    </div>

                    <button type="submit" class="btn-submit">Procesar Solicitud</button>
                </form>
            `
        });
        appAdmin.mount('#app-admin');
    </script>
</body>
</html>
