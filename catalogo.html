<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - SportFit Pro</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div id="app-catalogo"></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="assets/js/componentes.js"></script>
    
    <script>
        const appCatalogo = Vue.createApp({
            components: {
                'mi-header': ComponenteHeader,
                'mi-footer': ComponenteFooter
            },
            template: `
                <div>
                    <mi-header></mi-header>

                    <div class="container">
                        <h2>Nuestros Productos</h2>
                        <div class="grid-productos">
                            
                            <div class="producto">
                                <img src="assets/img/productos/tenis1.jpg" alt="Tenis Running">
                                <h3>Tenis Velocity X</h3>
                                <p>Amortiguación avanzada para corredores.</p>
                                <div class="precio">$1,899.00</div>
                                <button class="btn-comprar">Agregar</button>
                            </div>

                            <div class="producto">
                                <img src="assets/img/productos/playera1.jpg" alt="Playera Dry">
                                <h3>Playera TechFit</h3>
                                <p>Tecnología de secado rápido.</p>
                                <div class="precio">$450.00</div>
                                <button class="btn-comprar">Agregar</button>
                            </div>

                            <div class="producto">
                                <img src="assets/img/productos/short1.jpg" alt="Short Gym">
                                <h3>Short Flex Pro</h3>
                                <p>Movilidad total para tus entrenamientos.</p>
                                <div class="precio">$599.00</div>
                                <button class="btn-comprar">Agregar</button>
                            </div>
                            
                            <div class="producto">
                                <img src="assets/img/productos/sudadera1.jpg" alt="Sudadera">
                                <h3>Sudadera Termal</h3>
                                <p>Ideal para entrenar en invierno.</p>
                                <div class="precio">$950.00</div>
                                <button class="btn-comprar">Agregar</button>
                            </div>

                        </div>
                    </div>

                    <mi-footer></mi-footer>
                </div>
            `
        });
        appCatalogo.mount('#app-catalogo');
    </script>
</body>
</html>
