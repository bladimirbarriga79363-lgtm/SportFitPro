<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - SportFit Pro</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        form input, form textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app-contacto"></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="assets/js/componentes.js"></script>
    
    <script>
        const appContacto = Vue.createApp({
            components: {
                'mi-header': ComponenteHeader,
                'mi-footer': ComponenteFooter
            },
            template: `
                <div>
                    <mi-header></mi-header>

                    <div class="container">
                        <h1>Contáctanos</h1>
                        <p>¿Tienes dudas sobre tu talla o algún pedido? Escríbenos.</p>
                        
                        <form>
                            <label for="nombre">Nombre Completo:</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Ejemplo Kevin Martínez" required>

                            <label for="email">Correo Electrónico:</label>
                            <input type="email" id="email" name="email" placeholder="kevin@gmail.com" required>

                            <label for="mensaje">Mensaje:</label>
                            <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu duda aquí..."></textarea>

                            <button type="submit" class="btn-comprar">Enviar Mensaje</button>
                        </form>
                    </div>

                    <mi-footer></mi-footer>
                </div>
            `
        });
        appContacto.mount('#app-contacto');
    </script>
    
</body>
</html>
