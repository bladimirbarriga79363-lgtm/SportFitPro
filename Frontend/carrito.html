<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Carrito - SportFit Pro</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/formularios.css">
    <style>
        .carrito-container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .item-carrito { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 15px 0; }
        .item-info h4 { margin: 0; color: #002b5c; }
        .item-precio { font-weight: bold; color: #ff5722; font-size: 18px; }
        .btn-eliminar { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .total-container { text-align: right; margin-top: 20px; font-size: 22px; font-weight: bold; color: #002b5c; }
        .btn-comprar { background: #4caf50; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; }
        /* Diseño y animación para el contenedor de los botones */
        .botones-carrito {
            display: flex; 
            gap: 15px; 
            margin-top: 25px;
        }

        
        /* Diseño y animación para Seguir Comprando */
        .btn-volver {
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 55px; 
            padding: 0 15px; 
            margin: 0; 
            background: #002b5c; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            box-sizing: border-box; 
            transition: all 0.3s ease; 
        }
        .btn-volver:hover {
            background: #004080; 
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(0, 43, 92, 0.4); 
        }

        /* Diseño y animación para Proceder al Pago */
        .btn-comprar { 
            flex: 1;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 55px; 
            padding: 0 15px; 
            margin: 0; 
            background: #4caf50; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold;
            font-family: inherit; 
            box-sizing: border-box; 
            cursor: pointer; 
            transition: all 0.3s ease;
        }
        .btn-comprar:hover {
            background: #388e3c; 
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
    </style>
</head>
<body>
    <div id="app-carrito">
        <mi-header></mi-header>
        
        <main class="container">
            <div class="carrito-container">
                <h2 style="text-align: center; color: #002b5c; border-bottom: 2px solid #eee; padding-bottom: 10px;">🛒 Mi Carrito de Compras</h2>
                
                <div v-if="carrito.length === 0" style="text-align: center; padding: 40px;">
                    <p style="font-size: 18px; color: #666;">Tu carrito está vacío.</p>
                    <a href="catalogo.html" class="btn-modern" style="display: inline-block; text-decoration: none; margin-top: 15px;">Ir al Catálogo</a>
                </div>

                <div v-else>
                    <div v-for="(item, index) in carrito" :key="index" class="item-carrito">
                        <div class="item-info">
                            <h4>{{ item.nombre }}</h4>
                            <small>Código: {{ item.codigo }} | Cantidad: {{ item.cantidad }}</small>
                        </div>
                        <div class="item-precio">
                            $ {{ (item.precio * item.cantidad).toFixed(2) }}
                        </div>
                        <button class="btn-eliminar" @click="eliminarItem(index)">X</button>
                    </div>

                    <div class="total-container">
                        Total a pagar: $ {{ calcularTotal() }}
                    </div>

                    <div class="botones-carrito">
                        <a href="catalogo.html" class="btn-volver">
                            ← Seguir Comprando
                        </a>
                        <button class="btn-comprar" @click="procesarCompra">
                            Proceder al Pago 💳
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <mi-footer></mi-footer>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="assets/js/componentes.js"></script>
    <script>
        Vue.createApp({
            components: { 'mi-header': ComponenteHeader, 'mi-footer': ComponenteFooter },
            data() {
                return {
                    carrito: []
                }
            },
            mounted() {
                // Si el usuario llega aquí sin sesión, lo regresamos al login por seguridad
                if (!localStorage.getItem('sesionSportFit')) {
                    window.location.href = 'login.html';
                }
                
                // Cargamos los productos guardados en el navegador
                const carritoGuardado = localStorage.getItem('carritoSportFit');
                if (carritoGuardado) {
                    this.carrito = JSON.parse(carritoGuardado);
                }
            },
            methods: {
                calcularTotal() {
                    let total = 0;
                    this.carrito.forEach(item => {
                        total += (item.precio * item.cantidad);
                    });
                    return total.toFixed(2);
                },
                eliminarItem(index) {
                    this.carrito.splice(index, 1);
                    localStorage.setItem('carritoSportFit', JSON.stringify(this.carrito));
                },
                procesarCompra() {
                    alert("¡Gracias por tu compra! Procesaremos tu pedido pronto.");
                    this.carrito = [];
                    localStorage.removeItem('carritoSportFit');
                }
            }
        }).mount('#app-carrito');
    </script>
</body>
</html>
